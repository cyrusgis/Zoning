<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Edmonton Zoning Map</title>

    <style>
        html,
        body,
        #viewDiv {
            padding: 0;
            margin: 0;
            height: 100vh;
            width: 100%;
            font-family: "Montserrat";
        }

        .header {
            position: absolute;
            display: flex;
            width: 100%;
            height: 55px;
            z-index: 1;
            color: #f8f8f8;
            background: #69635c;
            font-size: 20px;
        }

        .title {
            margin: 15px;
        }

        /* Widget styling */

        .theme .esri-widget,
        .theme .esri-widget--button,
        .theme .esri-widget .esri-menu,
        .theme .esri-widget table,
        .theme .esri-popup__main-container,
        .theme .esri-popup .esri-popup__pointer-direction,
        .theme .esri-popup .esri-popup__button,
        .theme .esri-button,
        .theme .esri-widget a {
            background-color: #69635c;
            color: #fff;
        }

        .theme .esri-widget--button:focus,
        .theme .esri-widget--button:hover {
            background-color: #b35c00;
            color: #f8f8f8;
        }

        .theme .esri-button:focus,
        .theme .esri-button:hover {
            color: #fff;
        }
    </style>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
        href="https://js.arcgis.com/4.25/esri/themes/light/main.css" />

    <script src="https://js.arcgis.com/4.25/"></script>

    <script>
        require([
            "esri/Map",
            "esri/layers/GeoJSONLayer",
            "esri/views/MapView",
            "esri/widgets/Legend",
            "esri/widgets/BasemapGallery",
            "esri/widgets/Expand",
            "esri/widgets/Home"
        ], (
            Map,
            GeoJSONLayer,
            MapView,
            Legend,
            BasemapGallery,
            Expand,
            Home
        ) => {

            const url = "Zoning Overlays.geojson";

            const template = {
                title: "{overlay_code}",
                content: [{
                    type: "fields",
                    fieldInfos: [
                        {
                            fieldName: "overlay_code",
                            label: "Overlay Code"
                        },
                        {
                            fieldName: "overlay_descr",
                            label: "Description"
                        },
                        {
                            fieldName: "bylaw_no",
                            label: "Bylaw No."
                        }
                    ]
                }]
            };

            const layerRenderer = {
                type: "unique-value",
                field: "overlay_code",
                defaultSymbol: {
                    type: "simple-fill",
                    color: "rgba(63,40,102,0.3)"
                },

                uniqueValueInfos: [
                    {
                        value: "AA",
                        symbol: {
                            type: "simple-fill",
                            color: "rgba(255,146,0,0.5)"
                        }
                    },
                    {
                        value: "AB",
                        symbol: {
                            type: "simple-fill",
                            color: "rgba(109,248,43,0.5)"
                        }
                    },
                    {
                        value: "BF",
                        symbol: {
                            type: "simple-fill",
                            color: "rgba(112,58,226,0.5)"
                        }
                    },
                    {
                        value: "CC",
                        symbol: {
                            type: "simple-fill",
                            color: "rgba(180,124,89,0.5)"
                        }
                    },
                    {
                        value: "CV",
                        symbol: {
                            type: "simple-fill",
                            color: "rgba(235,153,144,0.5)"
                        }
                    },
                    {
                        value: "DN",
                        symbol: {
                            type: "simple-fill",
                            color: "rgba(80,181,208,0.5)"
                        }
                    },
                    {
                        value: "ED",
                        symbol: {
                            type: "simple-fill",
                            color: "rgba(9,33,20,0.5)"
                        }
                    },
                    {
                        value: "EI",
                        symbol: {
                            type: "simple-fill",
                            color: "rgba(255,119,254,0.5)"
                        }
                    },
                    {
                        value: "ES",
                        symbol: {
                            type: "simple-fill",
                            color: "rgba(83,98,226,0.5)"
                        }
                    }
                ]
            };

            const geojsonLayer = new GeoJSONLayer({
                url: url,
                renderer: layerRenderer,
                popupTemplate: template
            });

            geojsonLayer.title = "Zoning";

            const map = new Map({
                basemap: "hybrid",
                layers: [geojsonLayer]
            });

            const view = new MapView({
                container: "viewDiv",
                center: [-113.50889530539204, 53.54349312566244],
                zoom: 11,
                map: map,
                padding: {
                    top: 55
                },

                popup: {
                    dockEnabled: true,
                    dockOptions: {
                        buttonEnabled: false,
                        breakpoint: false
                    }
                }
            });

            /* Legend */

            const legend = new Legend({
                view: view
            });

            view.ui.add(legend, "bottom-right");

            /* Home Button */

            const homeBtn = new Home({
                view: view
            });

            view.ui.add(homeBtn, "top-left");

            /* Basemap Gallery */

            const basemapGallery = new BasemapGallery({
                view: view,
                container: document.createElement("div")
            });

            const bgExpand = new Expand({
                view: view,
                content: basemapGallery
            });

            basemapGallery.watch("activeBasemap", () => {

                const mobileSize =
                    view.heightBreakpoint === "xsmall" ||
                    view.widthBreakpoint === "xsmall";

                if (mobileSize) {
                    bgExpand.collapse();
                }
            });

            view.ui.add(bgExpand, "top-left");

        });
    </script>
</head>

<body class="theme">

    <div class="header">
        <div class="title">
            Edmonton Zoning Sample Map
        </div>
    </div>

    <div id="viewDiv"></div>

</body>

</html>
